<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>트릭컬 스킬 가이드</title>
    <script>
    (function () {
        var s = localStorage.getItem('theme');
        var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', s || (d ? 'dark' : 'light'));
    })();
    </script>
    <link rel="icon" href="assets/icons/common_icons/NerIcon.webp" type="image/webp">
    <meta property="og:title" content="트릭컬 스킬 가이드">
    <meta property="og:description" content="트릭컬 리바이브 사도별 스킬 및 부가 효과 정리">
    <meta property="og:image" content="https://mediate1082.github.io/Trickal-Revive-Skill-Guide-Beta-0.8/assets/icons/common_icons/Skill.webp">
    <meta property="og:url" content="https://mediate1082.github.io/Trickal-Revive-Skill-Guide-Beta-0.8/">
    <meta property="og:type" content="website">

    <script>
        /* ── 캐시 버스팅 버전 ──────────────────────────────
           배포할 때 이 숫자만 올리면 CSS·JS 캐시가 자동으로 갱신됩니다. */
        var APP_VERSION = '1.2.5';
        document.write('<link rel="stylesheet" href="style.css?v=' + APP_VERSION + '">');
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

  
</head>

<body>
    <header class="tg-header">
        <div class="tg-accent-strip"></div>
        <div class="tg-header-inner">
            <div class="tg-header-logo">
                <img src="assets/icons/common_icons/NerIcon2.webp" alt="로고" class="tg-logo-img">
                <div class="tg-title-wrap">
                    <div class="tg-eyebrow">Trickcal · Skill Guide</div>
                    <h1 class="tg-title main-title">트릭컬 <em>스킬</em> 가이드</h1>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <button id="theme-toggle" class="tg-theme-toggle" aria-label="테마 전환" title="테마 전환" onclick="window.toggleTheme()"></button>
                <button class="tg-help-btn" onclick="openInfoModal()" aria-label="도움말">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 8C8 5.79 9.79 4 12 4s4 1.79 4 4c0 2.5-4 4-4 6"/>
                        <circle cx="12" cy="19" r="1" fill="currentColor" stroke="none"/>
                    </svg>
                </button>
            </div>
        </div>

    </header>

    <div class="tg-subheader">
        <div class="tg-nav-wrap">
            <div class="tg-nav">
                <div class="tg-nav-left">
                    <input type="hidden" id="sort-select" value="name">
                    <div class="tg-dropdown" id="sortDropdown">
                        <button type="button" class="tg-dropdown-btn" aria-expanded="false" aria-haspopup="listbox">
                            <span class="tg-dropdown-label">이름순</span>
                            <span class="tg-dropdown-caret">▾</span>
                        </button>
                    </div>

                    <button id="order-btn" class="tg-btn tg-btn-circle tg-btn-muted" onclick="toggleOrder()">▲</button>

                    <button class="tg-btn" onclick="openFilterModal()">
                        <span class="tg-btn-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/>
                            </svg>
                        </span>
                        부가 효과 필터
                        <span class="tg-btn-badge" id="filter-count"></span>
                    </button>

                    <button class="tg-btn" onclick="window.openAsideFilter()">
                        <span class="tg-btn-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/>
                            </svg>
                        </span>
                        어사이드 ★3 필터
                        <span class="tg-btn-badge" id="aside-filter-count" style="background:#c4b5fd;color:#5b21b6;"></span>
                    </button>
                </div>

                <div class="tg-nav-search">
                    <div class="tg-search">
                        <span class="tg-search-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/>
                            </svg>
                        </span>
                        <input type="text" id="search-input" placeholder="사도 이름 검색..." oninput="handleSortFilter()">
                        <button id="search-clear-btn" class="hidden" onclick="clearSearch()">&times;</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="active-filters" class="tg-chips-wrap" style="display:none;"></div>
    </div>

    <div class="tg-grid-wrap">
        <div id="loading-text" style="text-align:center; padding:50px; color:#888;">데이터 로딩 중...</div>
        <div id="main-grid" class="tg-grid"></div>
    </div>

<div id="modal-aside-filter" class="tg-modal-overlay hidden">
    <div class="tg-modal-card is-aside" onclick="event.stopPropagation()">
        <div class="tg-modal-header">
            <div class="tg-modal-title-wrap">
                <div class="tg-modal-eyebrow"><span style="color: #7a806d;">Aside ★3 Filter</span></div>
                <h3 class="tg-modal-title">어사이드 <em>★3</em> 필터</h3>
            </div>
            <span class="tg-modal-count" id="modal-aside-count" hidden>0개</span>
            <button class="tg-modal-close" onclick="window.closeAsideFilter()" aria-label="닫기">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="tg-modal-body">
            <div class="tg-segmented" id="aside-segmented">
                <div class="tg-segmented-indicator"></div>
                <button class="tg-segmented-btn is-active aside-tab" onclick="window.switchAsideFilterTab(0)">
                    <span class="tg-seg-icon">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/>
                        </svg>
                    </span>
                    <span>적용 대상</span>
                </button>
                <button class="tg-segmented-btn aside-tab" onclick="window.switchAsideFilterTab(1)">
                    <span class="tg-seg-icon">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3 L13.5 9.5 L20 11 L13.5 12.5 L12 19 L10.5 12.5 L4 11 L10.5 9.5 Z"/>
                        </svg>
                    </span>
                    <span>적용 효과</span>
                </button>
            </div>
            <label class="tg-any-option" id="aside-any-option">
                <input type="checkbox" id="aside-any-input">
                <span class="tg-radio"></span>
                <div class="tg-any-text">
                    <span class="tg-any-label">무관 · 상관없음</span>
                    <span class="tg-any-hint" id="aside-any-hint">이 적용 대상은 필터링하지 않음</span>
                </div>
            </label>
            <div class="tg-section-head">
                <span class="tg-section-title" id="aside-section-title">대상 선택 · 단일 선택</span>
                <button class="tg-section-action" id="aside-clear-all-btn"
                    onclick="window.clearAsideFilter()" style="visibility: hidden;" tabindex="-1" aria-hidden="true">
                    모두 해제 (0)
                </button>
            </div>
            <div class="tg-filter-scroll" id="aside-filter-scroll">
                <div id="aside-filter-group" class="tg-filter-grid"></div>
            </div>
        </div>
        <div class="tg-modal-footer">
            <button class="tg-btn-secondary" onclick="window.resetAsideFilter()">초기화</button>
            <button class="tg-btn-primary" onclick="window.applyAsideFilter()" id="aside-apply-btn">적용</button>
        </div>
    </div>
</div>

<div id="modal-filter" class="tg-modal-overlay hidden" onclick="closeFilterModal()">
    <div class="tg-modal-card" onclick="event.stopPropagation()">
        <div class="tg-modal-header">
            <div class="tg-modal-title-wrap">
                <div class="tg-modal-eyebrow">EFFECTS Filter</div>
                <h3 class="tg-modal-title">부가 효과 <em>필터</em></h3>
            </div>
            <span class="tg-modal-count" id="modal-filter-count" hidden>0개</span>
            <button class="tg-modal-close" onclick="closeFilterModal()" aria-label="닫기">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="tg-modal-body">
            <div class="tg-modal-search">
                <span class="tg-modal-search-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/>
                    </svg>
                </span>
                <input type="text" id="filter-search" placeholder="필터 키워드 검색..." oninput="refreshFilterList()">
            </div>
            <div class="tg-mode-row">
                <span class="tg-mode-label">조건 모드</span>
                <div class="tg-mode-switch">
                    <input type="radio" name="filter-mode" id="mode-or" value="OR" checked onchange="handleSortFilter()">
                    <label for="mode-or">OR · 하나라도</label>
                    <input type="radio" name="filter-mode" id="mode-and" value="AND" onchange="handleSortFilter()">
                    <label for="mode-and">AND · 모두</label>
                    <div class="tg-mode-glider"></div>
                </div>
            </div>
            <div class="tg-toggle-row">
                <div class="tg-toggle-row-text">
                    <span class="tg-toggle-row-label">본인만 대상인 효과 제외</span>
                    <span class="tg-toggle-row-hint">자기 자신에게만 발동하는 버프/디버프 숨김</span>
                </div>
                <label class="tg-switch">
                    <input type="checkbox" id="exclude-self-toggle" onchange="handleSortFilter()">
                    <span class="tg-switch-slider"></span>
                </label>
            </div>
            <div class="tg-section-head" style="margin-top: 6px;">
                <span class="tg-section-title" id="filter-section-title">효과 목록</span>
                <button class="tg-section-action" id="filter-clear-all-btn"
                    onclick="resetFilters()" style="visibility: hidden;" tabindex="-1" aria-hidden="true">
                    모두 해제 (0)
                </button>
            </div>
            <div class="tg-segmented" id="filter-segmented">
                <div class="tg-segmented-indicator"></div>
                <button class="tg-segmented-btn is-active" id="tab-all" onclick="setFilterTab('all')">
                    <span class="tg-seg-icon">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
                            <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>
                        </svg>
                    </span>
                    <span>전체</span>
                </button>
                <button class="tg-segmented-btn is-buff" id="tab-buff" onclick="setFilterTab('buff')">
                    <span>▲</span><span>버프</span>
                </button>
                <button class="tg-segmented-btn is-debuff" id="tab-debuff" onclick="setFilterTab('debuff')">
                    <span>▼</span><span>디버프</span>
                </button>
            </div>
            <div class="tg-filter-scroll" id="filter-checkbox-scroll">
                <div id="filter-checkbox-group" class="tg-filter-grid"></div>
            </div>
        </div>
        <div class="tg-modal-footer">
            <button class="tg-btn-secondary" onclick="resetFilters()">초기화</button>
            <button class="tg-btn-primary" onclick="applyFilterModal()" id="filter-apply-btn">적용</button>
        </div>
    </div>
</div>

<div id="modal-detail" class="modal-overlay hidden">
    <div class="modal-content" onclick="event.stopPropagation()">
        <!-- ui.js의 openDetailModal이 이 안을 innerHTML로 완전히 채움 -->
    </div>
</div>
    <div id="modal-info" class="modal-overlay hidden" onclick="closeModal('modal-info')">
        <div class="modal-content" onclick="event.stopPropagation()"><h3 style="margin:0;">범례</h3><p id="info-content" style="white-space:pre-wrap;"></p><button class="btn" style="width:100%; margin-top:15px;" onclick="closeModal('modal-info')">닫기</button></div>
    </div>

    <button id="top-btn" onclick="scrollToTop()">▲<div style="font-size:0.7rem;">TOP</div></button>


<script>
    (function () {
        var s = document.createElement('script');
        s.type = 'module';
        s.src = 'main.js?v=' + APP_VERSION;
        document.body.appendChild(s);
    })();
</script>

</body>
</html>
